name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main, "claude/**"]
  workflow_dispatch:

# Grant the workflow token the permissions needed by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; queue the next one if needed.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web bundle with pygbag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        # pygbag uses ffmpeg to transcode bundled MP3/WAV assets into OGG.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install pygbag
        run: |
          python -m pip install --upgrade pip
          pip install "pygbag>=0.9"

      - name: Build the WebAssembly bundle
        # Keep the default pygame-web CDN so pygbag can fetch `default.tmpl`
        # during the build. The Firefox OpaqueResponseBlocking fix is applied
        # post-build by self-hosting the runtime alongside the game (next step).
        run: |
          python -m pygbag \
            --build \
            --archive \
            --ume_block 0 \
            --disable-sound-format-error \
            main.py

      - name: Self-host the pygbag runtime
        # Firefox's OpaqueResponseBlocking (and strict CSP setups) reject the
        # cross-origin scripts pygame-web.github.io serves, leaving the canvas
        # blank. Mirror the runtime next to the game so everything loads from
        # the same origin.
        #
        # pythons.js uses relative ES-module imports for the feature modules
        # (vtx/snd/gui/fs), so the files have to sit at the *same directory*
        # as index.html — not in a cdn/ subfolder. The cpython bundle lives
        # under cpython312/ because that's how config.executable resolves it.
        run: |
          set -euo pipefail
          cd build/web
          CDN_BASE="https://pygame-web.github.io/cdn/0.9.3"

          fetch() {
            local rel="$1"
            mkdir -p "$(dirname "$rel")"
            if curl -fsSL "$CDN_BASE/$rel" -o "$rel"; then
              echo "  ok   $rel"
            else
              echo "  SKIP $rel"
            fi
          }

          # Runtime loaded directly by index.html + feature modules imported
          # relatively by pythons.js (see data-os="vtx,fs,gui,snd" in template).
          for f in \
            pythons.js \
            browserfs.min.js \
            vtx.js snd.js gui.js fs.js \
            xterm.js xterm.css \
            xterm-addon-image.js xterm-addon-fit.js xterm-addon-image.wasm \
            empty.html offline.png; do
            fetch "$f"
          done

          # CPython 3.12 WebAssembly bundle
          for f in \
            cpython312/main.js \
            cpython312/main.data \
            cpython312/main.wasm \
            cpython312/main.symbols \
            cpython312/bundle.json; do
            fetch "$f"
          done

          # Strip the absolute CDN URL from index.html so config.cdn becomes
          # empty and every subsequent import resolves relative to this page.
          sed -i 's|https://pygame-web.github.io/cdn/0.9.3/||g' index.html

          echo "--- build/web layout ---"
          ls -la
          echo "--- cpython312 ---"
          ls -la cpython312 2>/dev/null || true

      - name: Prepare artifact
        run: |
          ls -la build/web
          # GitHub Pages serves index.html at the deployed URL root.
          test -f build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
