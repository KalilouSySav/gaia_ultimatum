name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main, "claude/**"]
  workflow_dispatch:

# Grant the workflow token the permissions needed by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; queue the next one if needed.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web bundle with pygbag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        # pygbag uses ffmpeg to transcode bundled MP3/WAV assets into OGG.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install pygbag
        run: |
          python -m pip install --upgrade pip
          pip install "pygbag>=0.9"

      - name: Build the WebAssembly bundle
        # Keep the default pygame-web CDN so pygbag can fetch `default.tmpl`
        # during the build. The Firefox OpaqueResponseBlocking fix is applied
        # post-build by self-hosting the runtime alongside the game (next step).
        run: |
          python -m pygbag \
            --build \
            --archive \
            --ume_block 0 \
            --disable-sound-format-error \
            main.py

      - name: Self-host the pygbag runtime
        # Firefox's OpaqueResponseBlocking (and strict CSP setups) reject the
        # cross-origin scripts pygame-web.github.io serves, leaving the canvas
        # blank. Mirror the runtime into build/web/cdn/ and rewrite the
        # generated index.html to load everything from the same origin.
        run: |
          set -euo pipefail
          cd build/web
          CDN_BASE="https://pygame-web.github.io/cdn/0.9.3"
          mkdir -p cdn/cpython312

          fetch() {
            local rel="$1"
            mkdir -p "cdn/$(dirname "$rel")"
            if curl -fsSL "$CDN_BASE/$rel" -o "cdn/$rel"; then
              echo "  ok  $rel"
            else
              echo "  SKIP $rel"
            fi
          }

          # Runtime loaded directly by index.html
          fetch pythons.js

          # Runtime modules pythons.js fetches at startup
          for f in \
            browserfs.min.js \
            xterm.js xterm.css \
            xterm-addon-image.js xterm-addon-fit.js xterm-addon-image.wasm \
            vtx.js vtx.css \
            snd.js \
            gui.js gui.css \
            empty.html \
            offline.png \
            favicon.png; do
            fetch "$f"
          done

          # CPython 3.12 WebAssembly bundle (the biggest part)
          for f in \
            cpython312/main.js \
            cpython312/main.data \
            cpython312/main.wasm \
            cpython312/main.symbols \
            cpython312/bundle.json; do
            fetch "$f"
          done

          # Rewrite the config.cdn that index.html hands to pythons.js
          sed -i 's|https://pygame-web.github.io/cdn/0.9.3/|cdn/|g' index.html

          ls -lR cdn | head -40

      - name: Prepare artifact
        run: |
          ls -la build/web
          # GitHub Pages serves index.html at the deployed URL root.
          test -f build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
